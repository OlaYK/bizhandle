services:
  - type: web
    name: monidesk-api-dev
    runtime: python
    plan: free
    branch: dev
    rootDir: ibos-backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: export PYTHONPATH="${PYTHONPATH}:."; DATABASE_URL=$(echo "$DATABASE_URL" | sed -e 's|^postgres://|postgresql+psycopg://|' -e 's|^postgresql://|postgresql+psycopg://|'); export DATABASE_URL; alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://monidesk-frontend-dev.onrender.com,http://localhost:3000
      - key: AI_PROVIDER
        value: stub
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: TEAM_INVITE_WEB_BASE_URL
        value: https://monidesk-frontend-dev.onrender.com

  - type: web
    name: monidesk-frontend-dev
    runtime: static
    plan: free
    branch: dev
    rootDir: ibos-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://monidesk-api-dev.onrender.com
      - key: VITE_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET
        sync: false
      - key: VITE_CLOUDINARY_FOLDER
        value: monidesk
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
